name: SonarQube
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
    # ── Java (required by SonarCloud scanner) ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

    # ── Checkout — full history for better blame analysis ─────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

    # ── Cache SonarCloud packages ─────────────────────────────────────────────
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

    # ── Cache SonarCloud scanner ──────────────────────────────────────────────
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

    # ── Install SonarCloud scanner (only if not cached) ───────────────────────
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
            New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
            dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

    # ── Setup .NET 8 ──────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

    # ── Restore dependencies ──────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore backend/src/Core.Commerce/Core.Commerce.sln

    # ── Build and analyze ─────────────────────────────────────────────────────
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"RedeArmy_Product-Catalog-Platform" `
            /o:"redearmy" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**,**/*.Designer.cs,**/node_modules/**,**/dist/**"

          dotnet build backend/src/Core.Commerce/Core.Commerce.sln `
            --no-restore `
            --configuration Release

          ${{ runner.temp }}\scanner\dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"