services:

  # ─────────────────────────────────────────────────────────
  # DATABASE — postgres:16-alpine
  # Alpine keeps the image lightweight
  # ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # exposed so Rider can connect directly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # BACKEND — ASP.NET Core 8
  # depends_on with service_healthy ensures Postgres is ready
  # before the API attempts to connect.
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: unless-stopped
    profiles: ["full"]   # only starts with: docker compose --profile full up
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey:        ${JWT_KEY}
      Jwt__Issuer:            ${JWT_ISSUER}
      Jwt__Audience:          ${JWT_AUDIENCE}
      Jwt__ExpiresInMinutes:  ${JWT_EXPIRES_MINUTES}
      Uploads__Path:          /app/uploads
      Uploads__BaseUrl:       ${UPLOADS_BASE_URL}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:8080"

  # ─────────────────────────────────────────────────────────
  # FRONTEND — React + Vite (served via Nginx)
  # This service is only used under the "full" profile.
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_web
    restart: unless-stopped
    profiles: ["full"]
    depends_on:
      - backend
    ports:
      - "3000:80"

# ─────────────────────────────────────────────────────────
# VOLUMES
# postgres_data → database files persist across container restarts.
# uploads_data  → product images persist even if backend rebuilds.
# ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data: